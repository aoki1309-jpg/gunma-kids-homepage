  <script>
    const APP_STORE_URLS = {
      ios: "https://apps.apple.com/jp/app/id6757183880",
      android: "https://play.google.com/store/apps/details?id=net.kodomonotabi.gunmakidsapp",
    };

    const OFFICIAL_LINK_URLS = {
      line: "https://lin.ee/NxTli6X",
      instagram: "https://www.instagram.com/gunma_kodomonotabi/",
    };

    function detectAppBridgePlatform() {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const isIOS = /iPhone|iPad|iPod/i.test(ua)
        || (platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isIOS) return "ios";
      if (isAndroid) return "android";
      return "other";
    }

    function setupAppBridgeLinks() {
      const detected = detectAppBridgePlatform();
      const actions = document.getElementById("app-bridge-actions");
      const status = document.getElementById("app-bridge-status");
      const cards = Array.from(document.querySelectorAll("[data-store]"));

      cards.forEach((card) => {
        const store = card.getAttribute("data-store");
        const url = APP_STORE_URLS[store];
        const note = document.querySelector(`[data-store-note="${store}"]`);

        if (url) {
          card.href = url;
          card.target = "_blank";
          card.rel = "noopener noreferrer";
          if (note) note.textContent = "";
        } else {
          card.href = "#";
          card.setAttribute("aria-disabled", "true");
          card.classList.add("is-disabled");
          if (note) note.textContent = "準備中";
          card.addEventListener("click", (event) => event.preventDefault());
        }

        card.dataset.badge = "おすすめ";
        card.classList.toggle("is-recommended", store === detected);
      });

      if (detected === "ios") {
        actions.prepend(document.querySelector('[data-store="ios"]'));
        status.textContent = "iPhone / iPad の方は App Store からダウンロードしてください。";
      } else if (detected === "android") {
        actions.prepend(document.querySelector('[data-store="android"]'));
        status.textContent = "Android の方は Google Play からダウンロードしてください。";
      } else {
        status.textContent = "PCの方は、ご利用端末に合わせてストアを選んでください。";
      }
    }

    function setupOfficialLinks() {
      document.querySelectorAll("[data-official-link]").forEach((anchor) => {
        const key = anchor.getAttribute("data-official-link");
        const url = OFFICIAL_LINK_URLS[key];

        if (url) {
          anchor.href = url;
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";
          return;
        }

        anchor.href = "#";
        anchor.setAttribute("aria-disabled", "true");
        anchor.classList.add("is-disabled");
        anchor.addEventListener("click", (event) => event.preventDefault());
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupAppBridgeLinks();
      setupOfficialLinks();
    });
  </script>
