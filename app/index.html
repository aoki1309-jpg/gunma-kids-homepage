<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ぐんま子どもの旅 申込アプリ</title>
  <meta
    name="description"
    content="ぐんま子どもの旅 申込アプリのダウンロード案内ページです。iPhoneはApp Store、AndroidはGoogle Playへ進めます。"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <link rel="icon" href="images/favicon-192.png" type="image/png" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
</head>
<body class="app-bridge-page">
  <main class="app-bridge-main">
    <section class="app-bridge-panel" aria-labelledby="app-bridge-title">
      <img class="app-bridge-logo" src="images/kodomonotabilogo.png?v=2" alt="ぐんま子どもの旅ロゴ" />
      <p class="app-bridge-label">申込アプリ</p>
      <h1 id="app-bridge-title">ぐんま子どもの旅 申込アプリ</h1>
      <p class="app-bridge-lead">
        お使いの端末に合わせて、ストアを選んでください。
      </p>
      <p id="app-bridge-status" class="app-bridge-status" aria-live="polite">
        端末を確認しています。
      </p>

      <div id="app-bridge-actions" class="app-bridge-actions" aria-label="アプリストアリンク">
        <a class="app-bridge-store app-bridge-store--ios" data-store="ios" href="#">
          <span class="app-bridge-store-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M16.6 12.8c0-2.2 1.8-3.3 1.9-3.4-1-1.5-2.6-1.7-3.2-1.8-1.4-.1-2.7.8-3.4.8-.7 0-1.8-.8-3-.8-1.5 0-2.9.9-3.7 2.2-1.6 2.8-.4 6.9 1.1 9.1.8 1.1 1.7 2.3 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7c1.2 0 2-1.1 2.8-2.2.9-1.3 1.2-2.5 1.2-2.6-.1 0-2.6-1-2.6-3.6ZM14.4 6.2c.6-.8 1.1-1.8 1-2.9-1 .1-2.1.7-2.8 1.4-.6.7-1.1 1.7-1 2.8 1.1.1 2.1-.5 2.8-1.3Z" />
            </svg>
          </span>
          <span class="app-bridge-store-text">
            <span class="app-bridge-store-kicker">iPhone / iPad</span>
            <span class="app-bridge-store-title">App Store で開く</span>
            <span class="app-bridge-store-note" data-store-note="ios"></span>
          </span>
        </a>
        <a class="app-bridge-store app-bridge-store--android" data-store="android" href="#">
          <span class="app-bridge-store-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M7.2 9.4h9.6c.5 0 .9.4.9.9v6.8c0 .5-.4.9-.9.9h-.7v1.9c0 .6-.5 1.1-1.1 1.1s-1.1-.5-1.1-1.1V18h-3.8v1.9c0 .6-.5 1.1-1.1 1.1s-1.1-.5-1.1-1.1V18h-.7c-.5 0-.9-.4-.9-.9v-6.8c0-.5.4-.9.9-.9Zm-2.7.5c.6 0 1.1.5 1.1 1.1v4.5c0 .6-.5 1.1-1.1 1.1s-1.1-.5-1.1-1.1V11c0-.6.5-1.1 1.1-1.1Zm15 0c.6 0 1.1.5 1.1 1.1v4.5c0 .6-.5 1.1-1.1 1.1s-1.1-.5-1.1-1.1V11c0-.6.5-1.1 1.1-1.1ZM8.4 4.1l1.2 2.1c.7-.3 1.5-.4 2.4-.4s1.7.1 2.4.4l1.2-2.1.9.5-1.2 2.1c1.2.7 2 1.8 2.3 3H6.4c.3-1.2 1.1-2.3 2.3-3L7.5 4.6l.9-.5Zm1.4 4.1c.4 0 .7-.3.7-.7s-.3-.7-.7-.7-.7.3-.7.7.3.7.7.7Zm4.4 0c.4 0 .7-.3.7-.7s-.3-.7-.7-.7-.7.3-.7.7.3.7.7.7Z" />
            </svg>
          </span>
          <span class="app-bridge-store-text">
            <span class="app-bridge-store-kicker">Android</span>
            <span class="app-bridge-store-title">Google Play で開く</span>
            <span class="app-bridge-store-note" data-store-note="android"></span>
          </span>
        </a>
      </div>

      <p class="app-bridge-help">
        自動では移動しません。必ずボタンを押してストアへ進んでください。
      </p>
    </section>
  </main>

  <script>
    const APP_STORE_URLS = {
      ios: "https://apps.apple.com/jp/app/id6757183880",
      android: "https://play.google.com/store/apps/details?id=net.kodomonotabi.gunmakidsapp",
    };

    function detectAppBridgePlatform() {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const isIOS = /iPhone|iPad|iPod/i.test(ua)
        || (platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isIOS) return "ios";
      if (isAndroid) return "android";
      return "other";
    }

    function setupAppBridgeLinks() {
      const detected = detectAppBridgePlatform();
      const actions = document.getElementById("app-bridge-actions");
      const status = document.getElementById("app-bridge-status");
      const cards = Array.from(document.querySelectorAll("[data-store]"));

      cards.forEach((card) => {
        const store = card.getAttribute("data-store");
        const url = APP_STORE_URLS[store];
        const note = document.querySelector(`[data-store-note="${store}"]`);

        if (url) {
          card.href = url;
          card.target = "_blank";
          card.rel = "noopener noreferrer";
          if (note) note.textContent = "";
        } else {
          card.href = "#";
          card.setAttribute("aria-disabled", "true");
          card.classList.add("is-disabled");
          if (note) note.textContent = "準備中";
          card.addEventListener("click", (event) => event.preventDefault());
        }

        card.classList.toggle("is-recommended", store === detected);
      });

      if (detected === "ios") {
        actions.prepend(document.querySelector('[data-store="ios"]'));
        status.textContent = "iPhone / iPad の方は App Store を選んでください。";
      } else if (detected === "android") {
        actions.prepend(document.querySelector('[data-store="android"]'));
        status.textContent = "Android の方は Google Play を選んでください。";
      } else {
        status.textContent = "PCの方は、ご利用端末に合わせてストアを選んでください。";
      }
    }

    document.addEventListener("DOMContentLoaded", setupAppBridgeLinks);
  </script>
</body>
</html>
